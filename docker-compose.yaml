version: "3.9"
services:
  backend:
    build:
      context: ./Backend
    container_name: she-ield-backend
    image: backend:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    depends_on:
      - postgres
      - ml-service
    
  ml-service:
    build:
      context: ./ML-Services
    container_name: sheield-ml
    image: ml-services:latest
    restart: unless-stopped

    ports:
      - "8001:8001"
      
  postgres:
    image: postgres:17.6
    container_name: sheield-postgres
    restart: unless-stopped

    env_file:
      - docker-compose.env

    ports:
      - "5432:5432"
  
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
volumes:
  postgres_data:
   
  
     


   